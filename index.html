<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>恋爱树洞</title>
  <style>
    :root {
      --bg: #fff8fb;
      --panel: rgba(255, 255, 255, 0.86);
      --line: rgba(15, 23, 42, 0.1);
      --text: #1f2937;
      --muted: #6b7280;
      --left: #f472b6;
      --left-deep: #ec4899;
      --right: #60a5fa;
      --right-deep: #3b82f6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 12% 10%, rgba(244, 114, 182, 0.18), transparent 60%),
        radial-gradient(900px 600px at 85% 35%, rgba(96, 165, 250, 0.18), transparent 60%),
        var(--bg);
    }

    .wrap {
      max-width: 1050px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .header {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }

    .switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .door {
      border: 0;
      color: #fff;
      text-align: left;
      border-radius: 22px;
      padding: 20px 16px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.15);
      transition: transform .2s ease, filter .2s ease;
    }
    .door:hover { transform: translateY(-2px); filter: saturate(1.05); }

    .door h2 { margin: 0 0 6px; font-size: 20px; }
    .door p { margin: 0; line-height: 1.7; font-size: 14px; opacity: .95; }

    .door.left {
      background: linear-gradient(135deg, var(--left), var(--left-deep));
    }

    .door.right {
      background: linear-gradient(135deg, var(--right), var(--right-deep));
    }

    .panel {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 10px 36px rgba(15, 23, 42, 0.1);
      padding: 16px;
    }

    .panel.show { display: block; }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .tip {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
    }

    textarea { min-height: 110px; resize: vertical; line-height: 1.7; }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      background: #111827;
    }

    button.light {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .list {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .item .meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .item h4 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .item p {
      margin: 0;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      margin: 8px 0 0;
    }

    @media (max-width: 780px) {
      .switch { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="header">
      <h1>恋爱树洞 · 认真爱，也认真沟通</h1>
      <p class="sub">
        这是一个给两个人使用的小网页：
        <b>左边</b>用来记录你们的美好回忆瞬间，
        <b>右边</b>用来温柔地诉说不满。
        我参考了常见亲密关系沟通建议：先说事实，再表达感受，再提期待。
      </p>
    </section>

    <section class="switch">
      <button class="door left" id="openMemory">
        <h2>💗 回忆小屋（左）</h2>
        <p>把今天的甜、暖、被爱的瞬间都写下来，未来会是你们的情绪充电站。</p>
      </button>

      <button class="door right" id="openComplaint">
        <h2>🌧️ 诉说角落（右）</h2>
        <p>把委屈说出来，不攻击、不翻旧账，用“我感受到……”来代替指责。</p>
      </button>
    </section>

    <section class="panel show" id="memoryPanel">
      <div class="panel-head">
        <h3>💗 美好回忆瞬间</h3>
        <p class="tip">提示：越具体越珍贵，比如“今天下雨你把伞往我这边偏”。</p>
      </div>
      <form id="memoryForm">
        <input name="title" placeholder="这条回忆的标题（例如：第一次一起看日出）" required />
        <textarea name="content" placeholder="写下这个瞬间，越具体越好..." required></textarea>
        <div class="btn-row">
          <button type="submit">保存回忆</button>
          <button type="button" class="light" id="clearMemory">清空回忆</button>
        </div>
      </form>
      <div class="list" id="memoryList"></div>
      <p class="empty" id="memoryEmpty">还没有回忆，写下第一条甜蜜吧。</p>
    </section>

    <section class="panel" id="complaintPanel">
      <div class="panel-head">
        <h3>🌧️ 对方让我不舒服的时刻</h3>
        <p class="tip">建议句式：事实（发生了什么）→ 感受（我感到）→ 期待（我希望）。</p>
      </div>
      <form id="complaintForm">
        <input name="title" placeholder="这次不满的主题（例如：回复消息太慢）" required />
        <select name="mood" required>
          <option value="">选择你现在的情绪</option>
          <option>难过</option>
          <option>委屈</option>
          <option>生气</option>
          <option>失望</option>
          <option>焦虑</option>
        </select>
        <textarea name="content" placeholder="描述事实 + 感受 + 希望对方怎么做..." required></textarea>
        <div class="btn-row">
          <button type="submit">保存诉说</button>
          <button type="button" class="light" id="clearComplaint">清空诉说</button>
        </div>
      </form>
      <div class="list" id="complaintList"></div>
      <p class="empty" id="complaintEmpty">还没有诉说记录，希望你们都被温柔对待。</p>
    </section>
  </main>

  <script>
    const memoryKey = "love-tree-hole-memories";
    const complaintKey = "love-tree-hole-complaints";

    const memoryPanel = document.getElementById("memoryPanel");
    const complaintPanel = document.getElementById("complaintPanel");

    document.getElementById("openMemory").addEventListener("click", () => {
      memoryPanel.classList.add("show");
      complaintPanel.classList.remove("show");
    });

    document.getElementById("openComplaint").addEventListener("click", () => {
      complaintPanel.classList.add("show");
      memoryPanel.classList.remove("show");
    });

    function getData(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "[]");
      } catch {
        return [];
      }
    }

    function setData(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function createItemHTML(item, withMood = false) {
      return `
        <article class="item">
          <div class="meta">${item.time}${withMood ? ` · 情绪：${item.mood}` : ""}</div>
          <h4>${item.title}</h4>
          <p>${item.content}</p>
        </article>
      `;
    }

    function render() {
      const memories = getData(memoryKey);
      const complaints = getData(complaintKey);

      document.getElementById("memoryList").innerHTML = memories
        .map((item) => createItemHTML(item))
        .join("");
      document.getElementById("complaintList").innerHTML = complaints
        .map((item) => createItemHTML(item, true))
        .join("");

      document.getElementById("memoryEmpty").style.display = memories.length ? "none" : "block";
      document.getElementById("complaintEmpty").style.display = complaints.length ? "none" : "block";
    }

    function nowText() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    document.getElementById("memoryForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const item = {
        title: (fd.get("title") || "").toString().trim(),
        content: (fd.get("content") || "").toString().trim(),
        time: nowText()
      };
      if (!item.title || !item.content) return;
      const old = getData(memoryKey);
      old.unshift(item);
      setData(memoryKey, old);
      e.target.reset();
      render();
    });

    document.getElementById("complaintForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const item = {
        title: (fd.get("title") || "").toString().trim(),
        mood: (fd.get("mood") || "").toString().trim(),
        content: (fd.get("content") || "").toString().trim(),
        time: nowText()
      };
      if (!item.title || !item.content || !item.mood) return;
      const old = getData(complaintKey);
      old.unshift(item);
      setData(complaintKey, old);
      e.target.reset();
      render();
    });

    document.getElementById("clearMemory").addEventListener("click", () => {
      localStorage.removeItem(memoryKey);
      render();
    });

    document.getElementById("clearComplaint").addEventListener("click", () => {
      localStorage.removeItem(complaintKey);
      render();
    });

    render();
  </script>
</body>
</html>
